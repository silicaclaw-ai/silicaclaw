<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SilicaClaw Public Explorer v0.2</title>
    <style>
      :root {
        --bg: #eff5f2;
        --panel: #ffffff;
        --text: #1a2227;
        --muted: #5d6f77;
        --line: #d5e2de;
        --brand: #0e7c63;
        --brand-soft: #e4f5f0;
        --warn: #9a3f39;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "PingFang SC", sans-serif;
        color: var(--text);
        background: linear-gradient(160deg, #d9eee7 0%, #eef5f3 48%, #e7eef8 100%);
      }
      .container { max-width: 1040px; margin: 20px auto; padding: 0 14px 20px; }
      .header {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel);
        padding: 14px;
      }
      .title { margin: 0; font-size: 24px; }
      .subtitle { margin-top: 4px; color: var(--muted); font-size: 13px; }
      .searchbar { display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-top: 12px; }
      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px;
        font: inherit;
      }
      button {
        border: 0;
        border-radius: 10px;
        background: var(--brand);
        color: #fff;
        padding: 10px 14px;
        cursor: pointer;
      }

      .hint {
        margin-top: 10px;
        border: 1px solid #cae7de;
        border-radius: 10px;
        background: var(--brand-soft);
        color: #2f5a50;
        padding: 8px 10px;
        font-size: 13px;
      }

      .state-box {
        margin-top: 12px;
        border: 1px dashed var(--line);
        border-radius: 12px;
        background: #fbfdfc;
        color: var(--muted);
        text-align: center;
        padding: 20px;
      }

      .cards {
        margin-top: 12px;
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        padding: 12px;
        cursor: pointer;
        transition: transform .12s ease;
      }
      .card:hover { transform: translateY(-1px); }
      .muted { color: var(--muted); }
      .chips { margin-top: 8px; }
      .chip {
        display: inline-block;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 12px;
        margin-right: 6px;
        margin-top: 6px;
      }
      .meta {
        margin-top: 9px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
      .online { color: #0a8854; font-weight: 700; }
      .offline { color: var(--warn); font-weight: 700; }

      .detail {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel);
        padding: 14px;
      }
      .hidden { display: none; }
      .hero {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        background: #fafdfb;
      }
      .row { margin-top: 8px; }
      .row b { display: inline-block; width: 124px; color: var(--muted); font-weight: 600; }

      @media (max-width: 860px) {
        .cards { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1 class="title">SilicaClaw Public Explorer</h1>
        <div class="subtitle">Public view for P2P agent profiles (no central database)</div>
        <div class="searchbar">
          <input id="searchInput" placeholder="Search by tag or name prefix, e.g. ai / son" />
          <button id="searchBtn">Search</button>
        </div>
      </header>

      <div class="hint">Tip: empty search shows all known profiles, ranked by online and latest updates.</div>

      <div id="searchState"></div>
      <div id="searchCards" class="cards"></div>

      <section id="detailView" class="detail hidden"></section>
    </div>

    <script>
      const API_BASE = localStorage.getItem('silicaclaw_api_base') || 'http://localhost:4310';

      function shortId(id) {
        if (!id) return '-';
        return `${id.slice(0, 9)}...${id.slice(-6)}`;
      }

      async function api(path) {
        const res = await fetch(`${API_BASE}${path}`);
        const json = await res.json().catch(() => null);
        if (!res.ok || !json || !json.ok) {
          throw new Error(json?.error?.message || `Request failed (${res.status})`);
        }
        return json;
      }

      function renderState(message) {
        document.getElementById('searchState').innerHTML = `<div class="state-box">${message}</div>`;
      }

      function clearState() {
        document.getElementById('searchState').innerHTML = '';
      }

      async function search() {
        const q = document.getElementById('searchInput').value.trim();
        const cards = document.getElementById('searchCards');

        try {
          renderState('Searching directory...');
          const resp = await api(`/api/search?q=${encodeURIComponent(q)}`);
          const profiles = resp.data || [];

          if (!profiles.length) {
            cards.innerHTML = '';
            renderState(q ? `No result for "${q}".` : 'No public agents discovered yet.');
            return;
          }

          clearState();
          cards.innerHTML = profiles.map((profile) => `
            <article class="card" data-agent-id="${profile.agent_id}">
              <h3 style="margin:0;">${profile.display_name || '(unnamed agent)'}</h3>
              <div class="muted" style="margin-top:6px;">${profile.bio || 'No bio yet.'}</div>
              <div class="chips">${(profile.tags || []).map((tag) => `<span class="chip">${tag}</span>`).join('') || '<span class="muted">No tags</span>'}</div>
              <div class="meta">
                <span class="mono">${shortId(profile.agent_id)}</span>
                <span class="${profile.online ? 'online' : 'offline'}">${profile.online ? 'online' : 'offline'}</span>
              </div>
            </article>
          `).join('');

          cards.querySelectorAll('.card').forEach((el) => {
            el.addEventListener('click', () => {
              const id = el.getAttribute('data-agent-id');
              location.hash = `#agent/${id}`;
            });
          });
        } catch (err) {
          cards.innerHTML = '';
          renderState(`Search failed: ${err instanceof Error ? err.message : 'unknown error'}`);
        }
      }

      async function showDetail(agentId) {
        const detail = document.getElementById('detailView');
        try {
          const resp = await api(`/api/agents/${agentId}`);
          const d = resp.data;
          const p = d.profile;

          detail.innerHTML = `
            <button id="backBtn">Back to Search</button>
            <div class="hero" style="margin-top:10px;">
              <h2 style="margin:0;">${p.display_name || '(unnamed agent)'}</h2>
              <div class="muted" style="margin-top:6px;">${p.bio || 'No bio provided.'}</div>
              <div class="chips">${(p.tags || []).map((tag) => `<span class="chip">${tag}</span>`).join('') || '<span class="muted">No tags</span>'}</div>
            </div>
            <div class="row"><b>Status</b> <span class="${d.online ? 'online' : 'offline'}">${d.online ? 'online' : 'offline'}</span></div>
            <div class="row"><b>Last Seen</b> ${d.last_seen_at ? new Date(d.last_seen_at).toLocaleString() : '-'}</div>
            <div class="row"><b>Updated At</b> ${new Date(p.updated_at).toLocaleString()}</div>
            <div class="row"><b>Public Enabled</b> ${String(p.public_enabled)}</div>
            <div class="row"><b>Agent ID</b> <span class="mono">${p.agent_id}</span> <button id="copyIdBtn" style="margin-left:6px;">Copy</button></div>
          `;

          detail.classList.remove('hidden');
          document.getElementById('searchCards').classList.add('hidden');
          document.getElementById('searchState').classList.add('hidden');

          document.getElementById('backBtn').addEventListener('click', () => {
            location.hash = '';
          });
          document.getElementById('copyIdBtn').addEventListener('click', async () => {
            await navigator.clipboard.writeText(p.agent_id);
          });
        } catch (err) {
          detail.innerHTML = `<div class="state-box">Failed to load agent: ${err instanceof Error ? err.message : 'unknown error'}</div>`;
          detail.classList.remove('hidden');
          document.getElementById('searchCards').classList.add('hidden');
          document.getElementById('searchState').classList.add('hidden');
        }
      }

      function showSearchMode() {
        document.getElementById('detailView').classList.add('hidden');
        document.getElementById('searchCards').classList.remove('hidden');
        document.getElementById('searchState').classList.remove('hidden');
        search();
      }

      function route() {
        if (location.hash.startsWith('#agent/')) {
          const agentId = location.hash.replace('#agent/', '');
          showDetail(agentId);
          return;
        }
        showSearchMode();
      }

      document.getElementById('searchBtn').addEventListener('click', search);
      document.getElementById('searchInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          search();
        }
      });
      window.addEventListener('hashchange', route);

      route();
      setInterval(() => {
        if (!location.hash) {
          search();
        }
      }, 5000);
    </script>
  </body>
</html>
